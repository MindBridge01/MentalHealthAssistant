name: mindbridge_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
    
  video_player: ^2.9.2
  flutter_svg: ^2.0.10

  cupertino_icons: ^1.0.8

  # Added for backend integration & state management
  http: ^1.2.0
